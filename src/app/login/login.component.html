<div class="login-container">
  <div class="login-card">

    <h1>Empleo Mujeres 💜</h1>
    <p class="subtitle">Encuentra oportunidades seguras y cercanas a ti</p>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input
        type="email"
        [(ngModel)]="correo"
        placeholder="ejemplo@correo.com"
      />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
      />
    </div>

    <button class="btn-login" (click)="login()">
      Ingresar
    </button>

    <p class="link-text">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>

  </div>
</div>
